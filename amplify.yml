version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Node $(node -v) / npm $(npm -v)"
        # Wipe install + Next cache so Amplify never reuses a poisoned tree.
        - rm -rf node_modules .next
        - npm ci
        - npx prisma generate
        - node -e "console.log('next=', require('next/package.json').version)"
    build:
      commands:
        # Normalize DB URL for Prisma without writing secrets into source files.
        - |
          if [ -n "$DB_HOST" ] && [ -n "$DB_USER" ] && [ -n "$DB_PASSWORD" ] && [ -n "$DB_NAME" ]; then
            export DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}?sslmode=${DB_SSLMODE:-require}"
            export DIRECT_URL="$DATABASE_URL"
            echo "Assembled DATABASE_URL from DB_* parts"
          elif [ -n "$DATABASE_URL" ]; then
            export DATABASE_URL="$(printf '%s' "$DATABASE_URL" | sed 's/%26/\&/g')"
            export DIRECT_URL="${DIRECT_URL:-$DATABASE_URL}"
            echo "Normalized DATABASE_URL (%26 → &)"
          else
            echo "WARNING: no DATABASE_URL / DB_* parts — migrate may fail"
          fi
        - echo "=== ensure-shipping ==="
        - node scripts/ensure-shipping-settings.cjs
        - echo "=== prisma migrate deploy ==="
        - npx prisma migrate deploy
        - echo "=== next build ==="
        # Force plain Next config (no Sentry webpack plugin) on Amplify.
        - export AMPLIFY_NEXT_PLAIN_CONFIG=1
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths: []
