version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npx prisma generate
    build:
      commands:
        # Amplify SSR compute often has empty process.env for app secrets.
        # Snapshot console env into a JSON module that the server bundle loads.
        - |
          if [ -n "$DB_HOST" ] && [ -n "$DB_USER" ] && [ -n "$DB_PASSWORD" ] && [ -n "$DB_NAME" ]; then
            export DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}?sslmode=${DB_SSLMODE:-require}"
            export DIRECT_URL="$DATABASE_URL"
            echo "Assembled DATABASE_URL from DB_* parts"
          elif [ -n "$DATABASE_URL" ]; then
            export DATABASE_URL="$(printf '%s' "$DATABASE_URL" | sed 's/%26/\&/g')"
            export DIRECT_URL="${DIRECT_URL:-$DATABASE_URL}"
            echo "Normalized DATABASE_URL (%26 → &)"
          fi
        - node scripts/ensure-shipping-settings.cjs
        # D-01 FIX: Apply pending migrations to production DB on every deploy.
        # Without this, schema changes (new columns, tables) are not applied.
        - npx prisma migrate deploy
        - node scripts/write-amplify-runtime-env.cjs
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
